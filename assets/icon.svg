<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <radialGradient id="gBg" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#2a2270"/>
      <stop offset="0.6" stop-color="#191341"/>
      <stop offset="1" stop-color="#0f0d24"/>
    </radialGradient>
    <linearGradient id="gNeon" gradientUnits="userSpaceOnUse" x1="20" y1="40" x2="95" y2="98">
      <stop offset="0" stop-color="#2ee6ff"/>
      <stop offset="0.5" stop-color="#8f5cff"/>
      <stop offset="1" stop-color="#ff3ec8"/>
    </linearGradient>
    <linearGradient id="gBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2ee6ff"/>
      <stop offset="1" stop-color="#ff3ec8"/>
    </linearGradient>
    <radialGradient id="gGold" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#fff3c0"/>
      <stop offset="1" stop-color="#ffcf3a"/>
    </radialGradient>
    <linearGradient id="gCyanFade" gradientUnits="userSpaceOnUse" x1="8" y1="60" x2="112" y2="60">
      <stop offset="0" stop-color="#2ee6ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2ee6ff"/>
      <stop offset="1" stop-color="#ff3ec8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#gBg)"/>
  <rect x="30" y="30" width="452" height="452" rx="92" fill="none" stroke="url(#gBorder)" stroke-width="5" opacity="0.5" filter="url(#softGlow)"/>
  <rect x="30" y="30" width="452" height="452" rx="92" fill="none" stroke="url(#gBorder)" stroke-width="2.5" opacity="0.7"/>

  <!-- corner circuit accents -->
  <circle cx="86" cy="86" r="4" fill="#2ee6ff" opacity="0.55"/>
  <circle cx="426" cy="426" r="4" fill="#ff3ec8" opacity="0.55"/>

  <!-- ISOTIPO centrado -->
  <g transform="translate(106,106) scale(2.5)">
    <circle cx="60" cy="60" r="52" fill="none" stroke="url(#gCyanFade)" stroke-width="2.5" opacity="0.4"/>
    <circle cx="60" cy="8.5" r="3.4" fill="#2ee6ff"/>
    <circle cx="108" cy="74" r="2.8" fill="#ff3ec8"/>
    <circle cx="12" cy="70" r="2.4" fill="#8dff4a" opacity="0.9"/>
    <circle cx="50" cy="70" r="23" fill="none" stroke="url(#gNeon)" stroke-width="11" stroke-linecap="round" filter="url(#glow)"/>
    <rect x="70" y="34" width="12" height="58" rx="6" fill="url(#gNeon)"/>
    <circle cx="76" cy="36" r="9" fill="url(#gGold)" filter="url(#glow)"/>
    <circle cx="76" cy="36" r="3.2" fill="#fff8e0"/>
  </g>
</svg>
