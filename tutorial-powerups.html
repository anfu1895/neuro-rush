<!DOCTYPE html>
<html lang="es">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Neuro Rush — Cómo se juega</title>
<style>
  :root{
    --bg:#12102b; --bg2:#1c1745; --panel:#241d5c; --panel2:#2c2470;
    --cyan:#2ee6ff; --magenta:#ff3ec8; --gold:#ffd23e; --lime:#8dff4a;
    --red:#ff4a5e; --ice:#a5e8ff; --fire:#ff7a2e; --white:#fff;
    --text:#f2efff; --dim:#9b93d9;
    --font:"Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:var(--font);
    color:var(--text);
    background:
      radial-gradient(ellipse at 50% -20%, #2a1c66 0%, transparent 55%),
      radial-gradient(ellipse at 50% 120%, #3a1256 0%, transparent 55%),
      var(--bg);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:28px 18px;
    overflow-x:hidden;
  }

  .stage{
    display:flex; gap:34px; align-items:center; flex-wrap:wrap;
    justify-content:center; max-width:900px; width:100%;
  }

  /* ---------- Consola / teléfono ---------- */
  .device{ position:relative; flex:0 0 auto; }
  .phone{
    position:relative;
    width:320px; height:560px;
    background:linear-gradient(180deg, #17123a, #0f0c28);
    border:2px solid rgba(120,100,220,.35);
    border-radius:34px;
    padding:16px 15px;
    box-shadow:
      0 0 0 6px rgba(20,15,50,.7),
      0 24px 70px rgba(0,0,0,.6),
      0 0 90px rgba(120,60,200,.25);
    display:flex; flex-direction:column; gap:11px;
    overflow:hidden;
  }
  .phone::after{ /* barrido tipo pantalla arcade */
    content:''; position:absolute; inset:0; pointer-events:none; z-index:8;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.03) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;
  }

  .hud{ display:flex; gap:8px; }
  .box{
    flex:1; background:var(--panel); border-radius:13px;
    padding:7px 6px; text-align:center; box-shadow:0 3px 0 rgba(0,0,0,.35);
  }
  .box span{ display:block; font-size:8.5px; letter-spacing:2px; color:var(--dim); }
  .box b{ font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; }
  #score{ color:var(--cyan); }
  #combo{ color:var(--gold); }
  .rec{ color:var(--red); font-size:13px !important; letter-spacing:.5px; }
  .rec .dot{ animation:blink 1s steps(1) infinite; }
  @keyframes blink{ 50%{ opacity:.15; } }

  .combobar{ height:12px; background:var(--panel); border-radius:99px; overflow:hidden; box-shadow:inset 0 2px 5px rgba(0,0,0,.5); }
  .combobar i{ display:block; height:100%; width:0%; border-radius:99px;
    background:linear-gradient(90deg, var(--cyan), var(--magenta), var(--gold));
    transition:width .35s ease-out; }

  .grid{
    flex:1; display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(4,1fr);
    gap:8px; border-radius:16px; position:relative; transition:box-shadow .3s, background .3s;
    padding:2px;
  }
  .grid.frenzy{ box-shadow:0 0 0 2px var(--magenta), 0 0 26px rgba(255,62,200,.45); }
  .grid.frozen{ background:rgba(140,215,255,.10); box-shadow:0 0 0 2px var(--ice), 0 0 26px rgba(165,232,255,.4); }
  .grid.shielded{ box-shadow:0 0 0 3px var(--white), 0 0 30px rgba(255,255,255,.5); }
  .grid.shake{ animation:shake .4s; }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 20%{transform:translateX(-7px);} 60%{transform:translateX(7px);} }

  .cell{ background:rgba(255,255,255,.045); border-radius:14px; position:relative; }

  .orb{
    position:absolute; inset:11%; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:22px; animation:pop .18s ease-out;
  }
  @keyframes pop{ from{transform:scale(0);} to{transform:scale(1);} }
  .orb.leave{ animation:leave .3s ease-in forwards; }
  @keyframes leave{ to{ transform:scale(.3); opacity:0; } }
  .orb.target{ background:radial-gradient(circle at 35% 30%, #baf4ff, var(--cyan) 55%, #0e7fa0);
    box-shadow:0 0 18px var(--cyan), 0 0 36px rgba(46,230,255,.35); }
  .orb.gold{ background:radial-gradient(circle at 35% 30%, #fff3c4, var(--gold) 55%, #b8860b);
    box-shadow:0 0 20px var(--gold), 0 0 42px rgba(255,210,62,.4); }
  .orb.trap{ background:radial-gradient(circle at 35% 30%, #ffb3bd, var(--red) 55%, #8f1020);
    box-shadow:0 0 16px var(--red); }
  .orb.ice{ background:radial-gradient(circle at 35% 30%, #eaffff, var(--ice) 55%, #1b6fa8);
    box-shadow:0 0 18px var(--ice); }
  .orb.bomb{ background:radial-gradient(circle at 38% 32%, #3d3d46, #17171c 55%, #000);
    box-shadow:0 0 22px rgba(255,43,26,.6), 0 0 44px rgba(255,43,26,.3); }
  .orb.bomb .flame{ font-size:15px; filter:saturate(2) drop-shadow(0 0 6px #ff2b1a);
    animation:flick .4s infinite alternate; }
  @keyframes flick{ from{transform:scale(1);} to{transform:scale(1.25);} }
  .orb.storm{ background:radial-gradient(circle at 40% 35%, #ffd9f4, var(--magenta) 55%, #8a0f68);
    box-shadow:0 0 20px var(--magenta), 0 0 40px rgba(255,62,200,.45); animation:spin 1.1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .orb.white{ background:radial-gradient(circle at 35% 30%, #fff, #f0f0ff 55%, #9aa0d8);
    box-shadow:0 0 20px #fff, 0 0 40px rgba(255,255,255,.6); font-size:18px; }

  .ripple{ position:absolute; inset:0; border-radius:14px; border:2.5px solid var(--white);
    opacity:0; pointer-events:none; animation:rip .45s ease-out; }
  @keyframes rip{ 0%{ transform:scale(.6); opacity:.9; } 100%{ transform:scale(1.15); opacity:0; } }

  .pts{ position:absolute; left:50%; top:30%; transform:translateX(-50%);
    font-weight:900; font-size:16px; pointer-events:none; z-index:6;
    text-shadow:0 2px 6px rgba(0,0,0,.6); animation:floatUp .8s ease-out forwards; }
  @keyframes floatUp{ from{ transform:translate(-50%,0); opacity:1; } to{ transform:translate(-50%,-34px); opacity:0; } }

  .spark{ position:absolute; width:7px; height:7px; border-radius:50%; pointer-events:none; z-index:5;
    animation:spark .55s ease-out forwards; }
  @keyframes spark{ from{ transform:translate(0,0) scale(1); opacity:1; }
    to{ transform:translate(var(--dx), var(--dy)) scale(.2); opacity:0; } }

  .announce{
    position:absolute; left:0; right:0; top:42%; text-align:center; z-index:7;
    font-size:26px; font-weight:900; letter-spacing:.5px; pointer-events:none; opacity:0;
    padding:0 12px; text-wrap:balance;
  }
  .announce.show{ animation:ann 1.2s ease-out; }
  @keyframes ann{ 0%{opacity:0;transform:scale(.6);} 20%{opacity:1;transform:scale(1.12);}
    45%{transform:scale(1);} 80%{opacity:1;} 100%{opacity:0;transform:scale(1.04);} }

  .finger{
    position:absolute; width:34px; height:34px; z-index:9; pointer-events:none;
    left:0; top:0; transform:translate(150px,520px);
    transition:transform .32s cubic-bezier(.4,.1,.3,1);
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.5));
  }
  .finger::before{ content:'👆'; font-size:30px; }
  .finger.press::before{ animation:press .22s ease-out; }
  @keyframes press{ 50%{ transform:scale(.78); } }

  /* ---------- Panel lateral ---------- */
  .side{ flex:1 1 300px; max-width:360px; min-width:260px; display:flex; flex-direction:column; gap:16px; }
  .logo{
    font-size:clamp(34px,7vw,46px); font-weight:900; line-height:.95; letter-spacing:.5px;
    font-style:italic; text-wrap:balance;
    background:linear-gradient(92deg, var(--cyan), var(--magenta) 55%, var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 2px 14px rgba(255,62,200,.35));
  }
  .logo small{ display:block; -webkit-text-fill-color:var(--dim); font-style:normal;
    font-size:13px; font-weight:600; letter-spacing:3px; margin-top:8px; }

  .caption{
    font-size:16px; line-height:1.5; min-height:72px; color:var(--text);
    border-left:3px solid var(--cyan); padding:4px 0 4px 14px;
    transition:border-color .3s;
  }
  .caption b{ color:var(--gold); }

  .powers{ display:flex; gap:9px; }
  .pw{
    flex:1; background:var(--panel); border-radius:14px; padding:11px 6px 9px; text-align:center;
    border:2px solid transparent; transition:border-color .25s, transform .25s, box-shadow .25s;
    opacity:.55;
  }
  .pw .ic{ font-size:26px; line-height:1; }
  .pw .nm{ display:block; font-size:9.5px; letter-spacing:1.5px; margin-top:5px; color:var(--dim); font-weight:800; }
  .pw.on{ opacity:1; transform:translateY(-3px); }
  .pw.on.freeze{ border-color:var(--ice); box-shadow:0 0 20px rgba(165,232,255,.4); }
  .pw.on.bombs{ border-color:var(--red); box-shadow:0 0 20px rgba(255,74,94,.4); }
  .pw.on.storm{ border-color:var(--magenta); box-shadow:0 0 20px rgba(255,62,200,.4); }
  .pw.on.shield{ border-color:var(--white); box-shadow:0 0 20px rgba(255,255,255,.45); }

  .track{ height:5px; background:var(--panel); border-radius:99px; overflow:hidden; }
  .track i{ display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--cyan),var(--gold)); }

  .counter{ font-size:12px; color:var(--dim); letter-spacing:.3px; line-height:1.6; }
  .counter b{ color:var(--text); }

  .replay{
    align-self:flex-start; font-size:14px; font-weight:800; letter-spacing:.5px;
    padding:11px 22px; border:none; border-radius:99px; cursor:pointer; color:#0c0a24;
    background:linear-gradient(90deg, var(--cyan), var(--lime));
    box-shadow:0 4px 0 #0a5d70; transition:transform .08s;
  }
  .replay:active{ transform:translateY(3px); box-shadow:0 1px 0 #0a5d70; }
  .replay:focus-visible{ outline:3px solid var(--gold); outline-offset:3px; }

  @media (max-width:680px){
    .stage{ gap:24px; }
    .side{ order:2; max-width:340px; }
  }
  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; transition:none !important; }
    .finger{ display:none; }
  }
</style>

<div class="stage">
  <div class="device">
    <div class="phone">
      <div class="hud">
        <div class="box"><span>PUNTOS</span><b id="score">0</b></div>
        <div class="box"><span>COMBO</span><b id="combo">x1</b></div>
        <div class="box"><span>DEMO</span><b class="rec"><span class="dot">●</span> REC</b></div>
      </div>
      <div class="combobar"><i id="fill"></i></div>
      <div class="grid" id="grid"></div>
      <div class="announce" id="announce"></div>
      <div class="finger" id="finger"></div>
    </div>
  </div>

  <div class="side">
    <div class="logo">NEURO RUSH<small>CÓMO SE JUEGA ⚡</small></div>
    <p class="caption" id="caption">Cargando demo…</p>
    <div class="powers">
      <div class="pw freeze" id="pw-freeze"><span class="ic">🧊</span><span class="nm">HIELO</span></div>
      <div class="pw bombs" id="pw-bombs"><span class="ic">💥</span><span class="nm">EXPLOSIÓN</span></div>
      <div class="pw storm" id="pw-storm"><span class="ic">🌪️</span><span class="nm">TORMENTA</span></div>
      <div class="pw shield" id="pw-shield"><span class="ic">⚪</span><span class="nm">ESCUDO</span></div>
    </div>
    <div class="track"><i id="progress"></i></div>
    <p class="counter">Piedra-papel-tijera de poderes:<br><b>💥 vence 🧊 · 🌪️ vence 💥 · 🧊 vence 🌪️</b></p>
    <button class="replay" id="replay">▶ Repetir demo</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const grid = document.getElementById('grid');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const fillEl = document.getElementById('fill');
  const announceEl = document.getElementById('announce');
  const captionEl = document.getElementById('caption');
  const finger = document.getElementById('finger');
  const progress = document.getElementById('progress');
  const powers = {
    freeze: document.getElementById('pw-freeze'),
    bombs:  document.getElementById('pw-bombs'),
    storm:  document.getElementById('pw-storm'),
    shield: document.getElementById('pw-shield')
  };
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  const cells = [];
  for(let i=0;i<16;i++){
    const c=document.createElement('div');
    c.className='cell';
    grid.appendChild(c);
    cells.push(c);
  }

  let score=0, combo=1, timers=[];
  function setScore(v){ score=v; scoreEl.textContent=v; }
  function setCombo(v){ combo=v; comboEl.textContent='x'+v; }
  function setFill(p){ fillEl.style.width=p+'%'; }

  const ICON={ target:'', gold:'⭐', trap:'💀', ice:'❄️', storm:'🌪️', white:'🛡️' };
  function spawn(idx, type){
    const c=cells[idx];
    c.querySelectorAll('.orb').forEach(o=>o.remove());
    const o=document.createElement('div');
    o.className='orb '+type;
    if(type==='bomb'){ o.innerHTML='<span class="flame">🔥</span>'; }
    else o.textContent=ICON[type]||'';
    c.appendChild(o);
    return o;
  }
  function clearCell(idx){ cells[idx].querySelectorAll('.orb').forEach(o=>{ o.classList.add('leave'); setTimeout(()=>o.remove(),300); }); }
  function clearBoard(){ cells.forEach((c,i)=>clearCell(i)); }

  function ripple(idx){
    const r=document.createElement('div'); r.className='ripple';
    cells[idx].appendChild(r); setTimeout(()=>r.remove(),460);
  }
  function pts(idx, text, color){
    const p=document.createElement('div'); p.className='pts'; p.textContent=text; p.style.color=color;
    cells[idx].appendChild(p); setTimeout(()=>p.remove(),800);
  }
  function burst(idx, color, n){
    const c=cells[idx];
    for(let i=0;i<(n||8);i++){
      const s=document.createElement('div'); s.className='spark'; s.style.background=color;
      s.style.left='50%'; s.style.top='50%';
      const a=Math.random()*6.28, d=16+Math.random()*26;
      s.style.setProperty('--dx',(Math.cos(a)*d)+'px');
      s.style.setProperty('--dy',(Math.sin(a)*d)+'px');
      c.appendChild(s); setTimeout(()=>s.remove(),560);
    }
  }
  function moveFinger(idx){
    const gr=grid.getBoundingClientRect();
    const cr=cells[idx].getBoundingClientRect();
    const ph=finger.parentElement.getBoundingClientRect();
    const x=cr.left-ph.left+cr.width/2-17;
    const y=cr.top-ph.top+cr.height/2-6;
    finger.style.transform='translate('+x+'px,'+y+'px)';
  }
  function press(){ finger.classList.remove('press'); void finger.offsetWidth; finger.classList.add('press'); }

  function announce(text, color){
    announceEl.textContent=text; announceEl.style.color=color;
    announceEl.style.textShadow='0 0 22px '+color;
    announceEl.classList.remove('show'); void announceEl.offsetWidth; announceEl.classList.add('show');
  }
  function caption(text, color){
    captionEl.innerHTML=text;
    captionEl.style.borderColor=color||'var(--cyan)';
  }
  function setPower(name){
    Object.keys(powers).forEach(k=>powers[k].classList.toggle('on', k===name));
  }
  function clearPower(){ Object.values(powers).forEach(p=>p.classList.remove('on')); }

  // Toca un orbe: mueve el dedo, presiona, suma puntos y revienta
  function tap(idx, gain, color){
    moveFinger(idx);
    at(320, ()=>{
      press(); ripple(idx);
      setScore(score+gain); setCombo(combo+1);
      pts(idx, '+'+gain, color); burst(idx, color, 9);
      clearCell(idx);
    });
  }

  // ---- planificador de la línea de tiempo ----
  let t0=0;
  function at(delay, fn){ timers.push(setTimeout(fn, t0+delay)); }
  function seq(offset){ t0=offset; }

  const TOTAL=18000;

  function reset(){
    timers.forEach(clearTimeout); timers=[];
    setScore(0); setCombo(1); setFill(0); clearPower();
    grid.className='grid';
    cells.forEach((c,i)=>c.querySelectorAll('.orb').forEach(o=>o.remove()));
    announceEl.classList.remove('show');
    finger.style.transform='translate(150px,520px)';
  }

  function staticFrame(){
    // versión sin movimiento para reduce-motion
    reset();
    spawn(1,'target'); spawn(2,'gold'); spawn(6,'trap');
    spawn(8,'ice'); spawn(9,'bomb'); spawn(11,'storm'); spawn(5,'white');
    setScore(1240); setCombo(6); setFill(100);
    caption('Toca los orbes 🔵, atrapa ⭐, evita 💀 y desata tus poderes: <b>🧊 Hielo</b>, <b>💥 Explosión</b>, <b>🌪️ Tormenta</b> y <b>⚪ Escudo</b>.');
    Object.values(powers).forEach(p=>p.classList.add('on'));
    progress.style.width='100%';
  }

  function play(){
    if(reduce){ staticFrame(); return; }
    reset();
    progress.style.transition='none'; progress.style.width='0%';
    void progress.offsetWidth;
    progress.style.transition='width '+TOTAL+'ms linear'; progress.style.width='100%';

    // --- Básico: tapear orbes ---
    seq(300);
    at(0, ()=>caption('Los orbes 🔵 aparecen y se encogen. <b>Tócalos rápido</b> antes de que escapen.'));
    at(200, ()=>spawn(5,'target'));
    at(500, ()=>tap(5, 10, 'var(--cyan)'));
    at(950, ()=>{ spawn(6,'target'); spawn(10,'target'); setFill(22); });
    at(1250, ()=>tap(6, 20, 'var(--cyan)'));
    at(1900, ()=>tap(10, 30, 'var(--cyan)'));
    at(2350, ()=>setFill(45));

    // --- Estrella dorada ---
    seq(2900);
    at(0, ()=>caption('La <b>⭐ estrella dorada</b> vale mucho más. ¡No la dejes ir!'));
    at(150, ()=>spawn(9,'gold'));
    at(550, ()=>{ tap(9, 150, 'var(--gold)'); });
    at(1050, ()=>setFill(70));

    // --- Trampa ---
    seq(4400);
    at(0, ()=>caption('Las <b>💀 rojas son trampa</b>: si las tocas, pierdes vida y combo. Esquívalas.'));
    at(150, ()=>spawn(2,'trap'));
    at(500, ()=>moveFinger(6));
    at(1100, ()=>{ moveFinger(1); announce('¡evítala!','var(--red)'); });
    at(1700, ()=>clearCell(2));

    // --- Frenesí ---
    seq(6500);
    at(0, ()=>{ caption('Llena la barra de combo y entras en <b>FRENESÍ x2</b>: ¡puntos dobles!'); setFill(100); grid.classList.add('frenzy'); });
    at(300, ()=>announce('🔥 ¡FRENESÍ! 🔥','var(--magenta)'));

    // --- PODER 1: HIELO ---
    seq(7600);
    at(0, ()=>{ grid.className='grid frozen'; setPower('freeze');
      caption('<b>🧊 HIELO</b> — congela el tablero y lo llena de orbes. ¡Rómpelos todos mientras están quietos!'); });
    at(120, ()=>announce('🧊 ¡CONGELADO!','var(--ice)'));
    at(300, ()=>[0,3,7,12,15,8].forEach((i,k)=>setTimeout(()=>spawn(i,'ice'),k*60)));
    at(900, ()=>[0,3,7,12].forEach((i,k)=>setTimeout(()=>{ ripple(i); burst(i,'var(--ice)',7); pts(i,'+20','var(--ice)'); setScore(score+40); clearCell(i); },k*130)));
    at(1700, ()=>{ grid.classList.remove('frozen'); clearBoard(); });

    // --- PODER 2: EXPLOSIÓN ---
    seq(9700);
    at(0, ()=>{ setPower('bombs'); grid.classList.add('frenzy');
      caption('<b>💥 EXPLOSIÓN</b> — la bola negra arrasa TODO el tablero y te da puntos por cada orbe.'); });
    at(150, ()=>{ [1,2,4,6,7,9,11,13,14].forEach(i=>spawn(i, Math.random()<.3?'gold':'target')); spawn(10,'bomb'); });
    at(700, ()=>moveFinger(10));
    at(1050, ()=>{
      press(); announce('💥 ¡EXPLOSIÓN!','var(--red)');
      grid.classList.add('shake');
      cells.forEach((c,i)=>{ if(c.querySelector('.orb')){ burst(i,'var(--fire)',7); } });
      setScore(score+430);
      setTimeout(()=>{ clearBoard(); grid.classList.remove('shake'); }, 260);
    });

    // --- PODER 3: TORMENTA ---
    seq(11600);
    at(0, ()=>{ setPower('storm'); grid.className='grid frenzy';
      caption('<b>🌪️ TORMENTA</b> — en duelo, sacude y desordena el tablero del rival para que falle.'); });
    at(150, ()=>[3,5,6,9,10,12].forEach((i,k)=>setTimeout(()=>spawn(i,'storm'),k*70)));
    at(500, ()=>announce('🌪️ ¡TORMENTA!','var(--magenta)'));
    at(700, ()=>{ grid.classList.add('shake'); setTimeout(()=>grid.classList.remove('shake'),400); });
    at(1500, ()=>{ grid.classList.add('shake'); setTimeout(()=>grid.classList.remove('shake'),400); });
    at(2100, ()=>clearBoard());

    // --- PODER 4: ESCUDO (bola blanca) ---
    seq(14000);
    at(0, ()=>{ setPower('shield'); grid.className='grid';
      caption('<b>⚪ ESCUDO (bola blanca)</b> — 7 segundos donde NADA te afecta. Se compra <b>🛒 en la tienda</b>: actívalo antes de jugar.'); });
    at(120, ()=>spawn(6,'white'));
    at(500, ()=>moveFinger(6));
    at(850, ()=>{ press(); ripple(6); burst(6,'var(--white)',10); clearCell(6);
      grid.classList.add('shielded'); announce('🛡️ ¡ESCUDO! 🛡️','var(--white)'); });
    at(1350, ()=>spawn(9,'trap'));
    at(1750, ()=>{ ripple(9); burst(9,'var(--white)',8); pts(9,'🛡 ¡a salvo!','var(--white)'); clearCell(9); });
    at(2500, ()=>grid.classList.remove('shielded'));

    // --- Cierre ---
    seq(16900);
    at(0, ()=>{ clearPower(); grid.className='grid';
      caption('Reflejos + poderes + estrategia. <b>Contrarresta al rival</b> y llega a lo más alto. 🏆'); });
    at(200, ()=>announce('⚡ ¡ASÍ SE JUEGA! ⚡','var(--cyan)'));

    // bucle
    timers.push(setTimeout(play, TOTAL));
  }

  document.getElementById('replay').addEventListener('click', play);

})();
